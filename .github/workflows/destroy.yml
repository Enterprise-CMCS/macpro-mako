name: Destroy

on:
  delete:
  workflow_dispatch:
    inputs:
      environment:
        description: "Name of the environment to destroy:"
        required: true

jobs:
  resolve_stage:
    runs-on: ubuntu-22.04
    outputs:
      stage: ${{ steps.resolve.outputs.stage }}
      classification: ${{ steps.resolve.outputs.classification }}
      should_destroy: ${{ steps.resolve.outputs.should_destroy }}
    steps:
      - name: Resolve and validate stage
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENVIRONMENT: ${{ inputs.environment || '' }}
          EVENT_REF_TYPE: ${{ github.event.ref_type || '' }}
          EVENT_REF: ${{ github.event.ref || '' }}
        run: |
          set -euo pipefail

          is_protected_stage() {
            local stage="$1"
            [[ "${stage}" == "main" || "${stage}" == "val" || "${stage}" == "production" || "${stage}" == "datasink" ]]
          }

          stage=""

          if [[ -n "${INPUT_ENVIRONMENT}" ]]; then
            stage="${INPUT_ENVIRONMENT}"
          elif [[ "${EVENT_NAME}" == "delete" && "${EVENT_REF_TYPE}" == "branch" ]]; then
            stage="${EVENT_REF}"
          fi

          if [[ "${stage}" == snyk-* && ${#stage} -gt 26 ]]; then
            stage_hash=$(printf '%s' "${stage}" | sha1sum | cut -c1-8)
            stage_prefix="${stage#snyk-}"
            stage="snyk-${stage_prefix:0:2}-${stage_hash}"
          fi

          echo "stage=${stage}" >> "$GITHUB_OUTPUT"
          echo "Resolved stage: '${stage}'"

          if [[ -z "${stage}" ]]; then
            echo "classification=invalid" >> "$GITHUB_OUTPUT"
            echo "should_destroy=false" >> "$GITHUB_OUTPUT"
            if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "::error::Missing required environment input for workflow_dispatch."
              exit 1
            fi
            echo "No branch stage resolved for this event. Skipping destroy."
            exit 0
          fi

          if is_protected_stage "${stage}"; then
            echo "classification=protected" >> "$GITHUB_OUTPUT"
            echo "should_destroy=false" >> "$GITHUB_OUTPUT"
            if [[ "${EVENT_NAME}" == "delete" ]]; then
              echo "Stage '${stage}' is protected. Skipping delete-event destroy."
              exit 0
            fi
            echo "::error::Stage '${stage}' is protected and cannot be destroyed."
            exit 1
          fi

          if [[ "${stage}" == skipci* ]]; then
            echo "classification=invalid" >> "$GITHUB_OUTPUT"
            echo "should_destroy=false" >> "$GITHUB_OUTPUT"
            echo "Stage '${stage}' is skipci-prefixed. Skipping destroy."
            exit 0
          fi

          if [[ ! "${stage}" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "classification=invalid" >> "$GITHUB_OUTPUT"
            echo "should_destroy=false" >> "$GITHUB_OUTPUT"
            if [[ "${EVENT_NAME}" == "delete" ]]; then
              echo "Stage '${stage}' is invalid for CloudFormation stack naming; skipping delete-event destroy."
              exit 0
            fi
            echo "::error::Invalid stage '${stage}'. Stage must match ^[a-z][a-z0-9-]*$."
            exit 1
          fi

          echo "classification=destroyable" >> "$GITHUB_OUTPUT"
          echo "should_destroy=true" >> "$GITHUB_OUTPUT"
          echo "Stage '${stage}' is destroyable."

  destroy:
    needs: resolve_stage
    if: ${{ needs.resolve_stage.outputs.should_destroy == 'true' }}
    runs-on: ubuntu-22.04
    environment:
      name: ${{ needs.resolve_stage.outputs.stage }}
    env:
      STAGE_NAME: ${{ needs.resolve_stage.outputs.stage }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate stage name
        id: validate-stage
        run: |
          if [[ "$STAGE_NAME" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "valid=false" >> "$GITHUB_OUTPUT"
          echo "Skipping destroy for ref '$STAGE_NAME' because it is not a valid stage name."

      - uses: ./.github/actions/setup
        if: steps.validate-stage.outputs.valid == 'true'

      - name: Configure AWS credentials
        if: steps.validate-stage.outputs.valid == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_TO_ASSUME }}
          aws-region: us-east-1
          role-duration-seconds: 10800

      - name: Destroy
        if: steps.validate-stage.outputs.valid == 'true'
        run: run destroy --stage $STAGE_NAME --verify false

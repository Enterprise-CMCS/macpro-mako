name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1"

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v44.0.1
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}

name: ESLint

on: [pull_request]

env:
  FORCE_COLOR: 1
  TERM: xterm-256color

jobs:
  lint:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: ./.github/actions/setup

      - name: Install Dependencies
        run: run install

      - name: Run ESLint
        run: bun lint

service: ${self:custom.project}-cypress

frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-stack-termination-protection
  - "@stratiformdigital/serverless-iam-helper"
  - "@stratiformdigital/serverless-s3-security-helper"

provider:
  name: aws
  runtime: nodejs18.x
  region: ${env:REGION_A}

stackTags:
  PROJECT: ${self:custom.project}
  SERVICE: ${self:service}

iam:
  role:
    path: /delegatedadmin/developer/
    permissionsBoundary: arn:aws:iam::${aws:accountId}:policy/cms-cloud-admin/developer-boundary-policy
  statements:
    - Effect: Allow
      Action:
        - cloudwatch:GetDashboard
      Resource: "*"

custom:
  project: ${env:PROJECT}
  accountId: !Sub "${AWS::AccountId}"
  CognitoUserPoolClientDomain: ${param:CognitoUserPoolClientDomain}
  ApplicationEndpointUrl: ${param:ApplicationEndpointUrl}
  serverlessTerminationProtection:
    stages:
      - master
      - val
      - production

  # Add a package hook to run npm install
  package:
    patterns:
      - "!*"
      - package.json
    hooks:
      beforeCreateDeploymentArtifacts: yarn install

#added commands to 
commands:
  cypress:
    commands:
      - yarn cypress run --config-file cypress.config.js --config baseUrl=${self:custom.ApplicationEndpointUrl} cognitoUrl=${self:custom.CognitoUserPoolClientDomain}
  cypress:open:
    commands:
      - yarn cypress open --config-file cypress.config.js --config baseUrl=${self:custom.ApplicationEndpointUrl} cognitoUrl=${self:custom.CognitoUserPoolClientDomain}